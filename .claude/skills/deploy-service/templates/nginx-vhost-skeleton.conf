# nginx vhost skeleton (deploy-service skill).
#
# Заменить:
#   <DOMAIN>          — example.com
#   <UPSTREAM_HOST>   — два варианта по эталону `server-networks-defaults.md` §2.2:
#                       (а) имя сервиса в docker-сети — ПРЕДПОЧТИТЕЛЬНО, если nginx и
#                           контейнер-апстрим в одной сети (например, services). Docker
#                           DNS резолвит имя сервиса автоматически. Безопаснее: контейнеру
#                           не нужен ports:, он не торчит на хост.
#                       (б) 127.0.0.1 — если nginx работает НА ХОСТЕ (не в контейнере),
#                           а апстрим публикует ports: ["127.0.0.1:<PORT>:<APP_PORT>"].
#                           НИКОГДА не использовать (б) из контейнера nginx, который НЕ на
#                           network_mode: host — там 127.0.0.1 = локалхост самого
#                           контейнера, апстрима там нет.
#   <UPSTREAM_PORT>   — внутренний порт контейнера (тот, что слушает приложение)
#
# TLS-сертификат добавляется через acme.sh (см. SKILL.md Шаг 7) — пути ниже подгоняются
# под реальный путь в /etc/letsencrypt/live/<DOMAIN>/ или ~/.acme.sh/<DOMAIN>_ecc/.

server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    # Webroot для acme challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <DOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (минимум — расширь под свой сервис)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Логи на vhost-level — упрощает диагностику
    access_log /var/log/nginx/<DOMAIN>.access.log;
    error_log  /var/log/nginx/<DOMAIN>.error.log warn;

    location / {
        proxy_pass http://<UPSTREAM_HOST>:<UPSTREAM_PORT>;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
    }
}