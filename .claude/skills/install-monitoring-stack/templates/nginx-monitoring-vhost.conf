# nginx vhost для panel.<DOMAIN> — reverse-proxy для всех мониторинг-компонентов
#
# Установка:
#   cp templates/nginx-monitoring-vhost.conf /etc/nginx/sites-available/panel.<DOMAIN>.conf
#   sed -i 's|<DOMAIN>|panel.example.com|g' /etc/nginx/sites-available/panel.<DOMAIN>.conf
#   sed -i 's|<HTPASSWD>|/etc/nginx/htpasswd-monitoring|g' /etc/nginx/sites-available/panel.<DOMAIN>.conf
#   ln -s /etc/nginx/sites-available/panel.<DOMAIN>.conf /etc/nginx/sites-enabled/
#   nginx -t && nginx -s reload

server {
    listen 80;
    server_name <DOMAIN>;

    # ACME challenge (для Let's Encrypt HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Всё остальное — на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name <DOMAIN>;

    ssl_certificate     /etc/nginx/ssl/<DOMAIN>.pem;
    ssl_certificate_key /etc/nginx/ssl/<DOMAIN>.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Защита от XSS / clickjacking
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Basic Auth — глобально для всех location
    auth_basic "Monitoring Panel";
    auth_basic_user_file <HTPASSWD>;

    # ===== Uptime Kuma (корень) =====
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # WebSocket для Kuma
    }

    # ===== Beszel — host network, port 8090 =====
    location /beszel/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Dozzle — port 8080, base /dozzle =====
    location /dozzle/ {
        proxy_pass http://127.0.0.1:8080/dozzle/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Live-логи через WebSocket — длинные таймауты
        proxy_read_timeout 86400s;
    }

    # ===== Dockge — port 5001 =====
    location /dockge/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    access_log /var/log/nginx/<DOMAIN>.access.log;
    error_log  /var/log/nginx/<DOMAIN>.error.log;
}