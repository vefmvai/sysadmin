# beszel-compose.yml — Beszel hub + agent (host metrics)
#
# Установка:
#   cp templates/beszel-compose.yml /opt/monitoring/beszel.yml
#   cd /opt/monitoring && docker compose -f beszel.yml up -d
#
# Настройка первичной учётки — через scripts/configure-beszel-pair.sh (bcrypt в SQLite).
#
# КРИТИЧНО: hub в network_mode: host. В bridge-сети iptables блокирует порт 45876
# (agent ↔ hub), и метрики не доходят. Это известная проблема, зафиксирована в этапе 3.
# UFW deny 8090/tcp в качестве замены сетевой изоляции — внешний доступ только через nginx.

services:
  beszel:
    image: henrygd/beszel:0.18.7
    container_name: beszel
    restart: unless-stopped
    # Hub в host network — единственный надёжный режим. Bridge не работает.
    network_mode: host
    volumes:
      - ./beszel_data:/beszel_data
    environment:
      # Hub слушает 8090 на хосте; nginx проксирует panel.$DOMAIN/beszel/ → 127.0.0.1:8090
      - PORT=8090
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5

  beszel-agent:
    image: henrygd/beszel-agent:0.18.7
    container_name: beszel-agent
    restart: unless-stopped
    # Agent тоже в host — необходим доступ ко всем сетевым интерфейсам / cgroup хоста
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
    environment:
      - PORT=45876
      # KEY генерируется configure-beszel-pair.sh через ssh-keygen и подставляется через .env
      - KEY=${BESZEL_KEY:-PLACEHOLDER_REPLACE_AFTER_PAIR}
      - HUB_URL=http://localhost:8090